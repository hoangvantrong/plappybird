<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Plappy Bird</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hud">
        <span class="title">Plappy Bird</span>
        <span class="score" id="score">0</span>
      </header>
      <div class="canvas-wrap">
        <canvas id="game" width="360" height="640" aria-label="Plappy Bird game"></canvas>
        <div class="overlay" id="overlay">
          <div class="card">
            <h1 id="overlay-title">Plappy Bird</h1>
            <p id="overlay-msg" class="muted">Tap, click, or press Space to flap.</p>
            <button type="button" id="start-btn" class="btn">Play</button>
          </div>
        </div>
      </div>
      <p class="hint">Space / click / touch to flap · avoid the pipes</p>
    </div>
    <script src="game.js"></script>
  </body>
</html>
